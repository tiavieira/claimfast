services:
  - type: web
    name: claimfast-api
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm run seed --workspace=apps/api && npm run start --workspace=apps/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: DB_PATH
        value: /tmp/claimfast.db
